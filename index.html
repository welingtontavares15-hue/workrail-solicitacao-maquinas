<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKRAIL — Gestão de Solicitação AS&TS</title>
    <script>
        // Redireciona para a versão mais recente
        window.location.href = './workrail_v2.html';
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0e7b82 0%, #075a60 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { margin: 20px 0 10px; }
        p { margin: 10px 0; opacity: 0.9; }
        a {
            color: #fff;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>WORKRAIL</h1>
        <p>Carregando sistema...</p>
        <p style="font-size: 14px; margin-top: 20px;">
            Se não redirecionar automaticamente em 3 segundos,
            <a onclick="window.location.href='./workrail_v2.html'">clique aqui</a>
        </p>
    </div>
</body>
</html>
