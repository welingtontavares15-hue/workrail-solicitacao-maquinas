name: WORKRAIL — Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "O que deployar"
        required: true
        default: "all"
        type: choice
        options: [all, hosting, functions, rules]

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validacao do repositorio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json
      - name: Instalar dependencias
        working-directory: functions
        run: npm ci
      - name: Verificar arquivos obrigatorios
        run: |
          for f in firebase.json firestore.rules firestore.indexes.json .firebaserc functions/index.js functions/package.json workrail_v2.html; do
            [ -f "$f" ] && echo "OK $f" || (echo "FALTANDO: $f" && exit 1)
          done
      - name: Validar firebase.json
        run: |
          node -e "
            const c = JSON.parse(require('fs').readFileSync('firebase.json','utf8'));
            if (!c.functions) throw new Error('functions ausente');
            if (!c.firestore) throw new Error('firestore ausente');
            const rw = c.hosting.rewrites || [];
            if (!rw.some(r => r.source === '/api/config')) throw new Error('api/config ausente');
            console.log('firebase.json valido');
          "

  deploy:
    name: Deploy Firebase
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm install -g firebase-tools
      - name: Instalar deps functions
        working-directory: functions
        run: npm ci
      - name: Definir alvo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
          else
            echo "target=all" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Functions
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'functions'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions --project workrail-solenis --token "$FIREBASE_TOKEN" --non-interactive
      - name: Deploy Firestore Rules
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'rules'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only firestore --project workrail-solenis --token "$FIREBASE_TOKEN" --non-interactive
      - name: Deploy Hosting
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'hosting'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project workrail-solenis --token "$FIREBASE_TOKEN" --non-interactive
      - name: Health check
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'hosting'
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://workrail-solenis.web.app/api/health)
          [[ "$STATUS" == "200" || "$STATUS" == "503" ]] || exit 1
          echo "Health OK: $STATUS"

  preview:
    name: Preview Channel (PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORKRAIL_SOLENIS }}
          projectId: workrail-solenis
          channelId: preview-pr-${{ github.event.pull_request.number }}
