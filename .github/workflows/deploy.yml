name: WORKRAIL — Deploy Firebase

on:
  # Deploy automático em push para main
  push:
    branches:
      - main

  # Deploy manual com opções
  workflow_dispatch:
    inputs:
      target:
        description: "O que deployar"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - hosting
          - functions
          - rules

# ── Permissões mínimas necessárias ─────────────────────────────────────────
permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validação do repositório
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json
      - name: Fixar versão do npm
        run: npm install -g npm@10
      - name: Instalar dependências das Cloud Functions
        working-directory: functions
        run: npm ci
      - name: Verificar arquivos obrigatórios
        run: |
          required_files=("firebase.json" "firestore.rules" "firestore.indexes.json" ".firebaserc" "functions/index.js" "functions/package.json" "workrail_v2.html")
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ AUSENTE: $f"; exit 1; fi
            echo "✅ $f"
          done
      - name: Verificar secrets ausentes no código
        run: |
          if grep -rE '"apiKey":\s*"AIzaSy[0-9A-Za-z_-]{33}"' workrail_v2.html 2>/dev/null; then
            echo "❌ API KEY hardcoded!"; exit 1
          fi
          echo "✅ Nenhuma credencial hardcoded detectada"
      - name: Validar firebase.json
        run: |
          node -e "
            const cfg = JSON.parse(require('fs').readFileSync('firebase.json', 'utf8'));
            if (!cfg.hosting) throw new Error('hosting ausente');
            if (!cfg.functions) throw new Error('functions ausente');
            if (!cfg.firestore) throw new Error('firestore ausente');
            const rw = cfg.hosting.rewrites || [];
            if (!rw.some(r => r.source === '/api/config')) throw new Error('/api/config ausente');
            if (!rw.some(r => r.source === '/api/health')) throw new Error('/api/health ausente');
            console.log('✅ firebase.json válido');
          "
  deploy:
    name: Deploy Firebase
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json
      - name: Fixar versão do npm
        run: npm install -g npm@10
      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools
      - name: Instalar dependências das Cloud Functions
        working-directory: functions
        run: npm ci
      - name: Configurar Service Account para Firebase CLI
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORKRAIL_SOLENIS }}" > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIAL=/tmp/sa_key.json" >> $GITHUB_ENV
      - name: Determinar alvo do deploy
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
          else
            echo "target=all" >> $GITHUB_OUTPUT
          fi
      - name: Deploy — Cloud Functions
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'functions'
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: firebase deploy --only functions --project workrail-solenis --non-interactive
      - name: Deploy — Firestore Rules e Indexes
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'rules'
        run: firebase deploy --only firestore --project workrail-solenis --non-interactive
      - name: Deploy — Firebase Hosting
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'hosting'
        run: firebase deploy --only hosting --project workrail-solenis --non-interactive
      - name: Limpar credenciais
        if: always()
        run: rm -f /tmp/sa_key.json
      - name: Verificar saúde pós-deploy
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'hosting'
        run: |
          echo "Aguardando propagação (30s)..."
          sleep 30
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://workrail-solenis.web.app/api/health)
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "❌ Health check inesperado: $HTTP_STATUS"; exit 1
          fi
          echo "✅ Health check respondeu: $HTTP_STATUS"
  preview:
    name: Deploy Preview Channel
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORKRAIL_SOLENIS }}
          projectId: workrail-solenis
          channelId: preview-pr-${{ github.event.pull_request.number }}
